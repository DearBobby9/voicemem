name: VoiceMem
options:
  bundleIdPrefix: com.voicemem
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  VoiceMem:
    type: application
    platform: macOS
    sources:
      - path: VoiceMem
        excludes:
          - Resources/Info.plist
          - Resources/VoiceMem.entitlements
    info:
      path: VoiceMem/Resources/Info.plist
      properties:
        CFBundleDisplayName: VoiceMem
        CFBundleShortVersionString: "0.1.0"
        LSUIElement: true
        NSMicrophoneUsageDescription: "VoiceMem needs microphone access to continuously transcribe your voice into searchable text."
        NSHumanReadableCopyright: "Copyright © 2026 Bobby Jia. All rights reserved."
    entitlements:
      path: VoiceMem/Resources/VoiceMem.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voicemem.app
        PRODUCT_NAME: VoiceMem
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: GRDB
      - package: Sparkle
        product: Sparkle
      - package: WhisperKit

  VoiceMemTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: VoiceMemTests
    dependencies:
      - target: VoiceMem
